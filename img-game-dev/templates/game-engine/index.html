<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏名称</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-wrapper">
        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            <div id="ui-layer"></div>
        </div>
        
        <div id="controls-info">
            <h3>操作说明</h3>
            <ul>
                <li><strong>← →</strong> 移动</li>
                <li><strong>↑</strong> 跳跃</li>
                <li><strong>空格</strong> 攻击</li>
                <li><strong>P</strong> 暂停游戏</li>
            </ul>
        </div>
    </div>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
